<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripSync — Your group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">
  <nav class="top-nav">
    <a href="index.html" class="logo"><span class="dot"></span>TripSync</a>
  </nav>

  <!-- Ticket header: trip name + join code + members -->
  <div class="ticket">
    <div class="ticket-trip">
      <span class="trip-eyebrow">Trip</span>
      <h1 id="trip-name-display">Loading…</h1>
    </div>
    <div class="ticket-code">
      <span class="code-label">Join code — tap to copy</span>
      <span class="code-value" id="code-display" title="Click to copy">------</span>
      <span class="code-hint">Share this with your friends</span>
    </div>
  </div>

  <div class="members" id="members-list">
    <!-- member chips injected by group.js -->
  </div>

  <!-- Destination poll + weather -->
  <section class="feature-card">
    <span class="feature-tag">Destination poll</span>
    <h3>Where should we go?</h3>
    <form id="add-option-form" class="inline-form">
      <input type="text" id="option-place" placeholder="Suggest a place, e.g. Pondicherry" maxlength="40" required>
      <button type="submit" class="btn btn-primary btn-inline">Add</button>
    </form>
    <div class="form-error" id="add-option-error"></div>
    <div id="poll-options" class="poll-options"></div>
  </section>

  <!-- Real-time group chat -->
  <section class="feature-card">
    <span class="feature-tag">Group chat</span>
    <h3>Chat</h3>
    <div id="chat-messages" class="chat-messages"></div>
    <form id="chat-form" class="inline-form">
      <input type="text" id="chat-input" placeholder="Type a message…" maxlength="300" required autocomplete="off">
      <button type="submit" class="btn btn-primary btn-inline">Send</button>
    </form>
  </section>

  <!-- AI itinerary suggestions -->
  <section class="feature-card">
    <span class="feature-tag">AI itinerary</span>
    <h3>Get a suggested itinerary</h3>
    <form id="itinerary-form" class="itinerary-form">
      <div class="field">
        <label for="itinerary-destination">Destination</label>
        <input type="text" id="itinerary-destination" placeholder="e.g. Pondicherry" required>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="itinerary-days">Days</label>
          <input type="number" id="itinerary-days" min="1" max="14" value="3">
        </div>
        <div class="field">
          <label for="itinerary-groupsize">Group size</label>
          <input type="number" id="itinerary-groupsize" min="1" max="30" value="4">
        </div>
      </div>
      <button type="submit" id="itinerary-submit" class="btn btn-primary">Get AI itinerary</button>
    </form>
    <div class="form-error" id="itinerary-error"></div>
    <div id="itinerary-output" class="itinerary-output"></div>
  </section>

  <div class="section-stub">
    <span class="stub-tag">Coming next</span>
    <h3>Photo gallery</h3>
    <p>Upload and browse trip photos in one shared place.</p>
  </div>
</div>

<!-- Markdown rendering for AI suggestions (used by js/gemini.js) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/gemini.js"></script>
<script src="js/group.js"></script>
<script src="js/poll.js"></script>
<script src="js/weather.js"></script>
<script src="js/chat.js"></script>
<script src="js/itinerary.js"></script>
</body>
</html>
